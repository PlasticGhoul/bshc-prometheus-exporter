name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  prepare:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

  matrix:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
      packages: write
      id-token: write

    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1

    steps:
    - name: Prepare
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          echo "Setting up for x86_64"
          echo "RUNNER_ARCH=amd64" >> $GITHUB_ENV
        elif [[ "${{ matrix.os }}" == "ubuntu-24.04-arm" ]]; then
          echo "Setting up for ARM64"
          echo "RUNNER_ARCH=arm64" >> $GITHUB_ENV
        else
          echo "Unsupported OS: ${{ matrix.os }}"
          exit 1
        fi
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23.4'

    - name: Install dependencies
      run: go mod download && go mod verify
      working-directory: ./src

    - name: Build project
      run: go build -v -o ./bin/bshc-prometheus-exporter_${{ github.ref_name }}_${{ env.RUNNER_ARCH }} ./...
      working-directory: ./src

    - name: Get release
      id: get_release
      uses: bruceadams/get-release@v1.3.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.get_release.outputs.upload_url }}
        asset_path: ./src/bin/bshc-prometheus-exporter_${{ github.ref_name }}_${{ env.RUNNER_ARCH }}
        asset_name: bshc-prometheus-exporter_${{ github.ref_name }}_${{ env.RUNNER_ARCH }}
        asset_content_type: application/octet-stream

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker images
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ghcr.io/plasticghoul/bshc-prometheus-exporter:latest
          ghcr.io/plasticghoul/bshc-prometheus-exporter:${{ github.ref_name }}
        build-args: |
          ARTIFACT_NAME=bshc-prometheus-exporter_${{ github.ref_name }}_${{ env.RUNNER_ARCH }}
        platforms: ${{ matrix.os == 'ubuntu-latest' && 'linux/amd64' || 'linux/arm64' }}
        file: docker/Dockerfile
        no-cache: true